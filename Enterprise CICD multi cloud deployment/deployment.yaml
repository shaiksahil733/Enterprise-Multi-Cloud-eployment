apiVersion: apps/v1
kind: Deployment
metadata:
  name: sahil-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sahil-app
  template:
    metadata:
      labels:
        app: sahil-app
    spec:
      containers:
      - name: sahil-app
        image: sahil733/app:1
        ports:
        - containerPort: 5000